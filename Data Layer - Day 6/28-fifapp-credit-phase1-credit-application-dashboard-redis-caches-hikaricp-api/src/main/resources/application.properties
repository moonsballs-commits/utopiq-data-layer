spring.application.name=springdemo
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/fifapp
spring.datasource.username=fifapp_admin
spring.datasource.password=fifapp_admin
spring.datasource.driver-class-name=org.postgresql.Driver


spring.flyway.enabled=true
spring.flyway.schemas=flyway_training
spring.flyway.default-schema=flyway_training
spring.flyway.create-schemas=true

#for N+1 simulations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s

app.redis.dashboard-cache-prefix=dashboard:branch
app.redis.dashboard-cache-ttl=60s

spring.datasource.hikari.pool-name=HikariPoolTest
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.validation-timeout=1000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

logging.level.org.flywaydb=DEBUG